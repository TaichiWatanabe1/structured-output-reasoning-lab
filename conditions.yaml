# 実験条件の宣言ファイル。`experiment.py` がこれを読んでループする。
# 変更時は docs/experiment_design.md §6 と整合性を保つこと。

# Stage 定義: 軸1 (Output × Prompt) × 軸2 (StepConstrained のサブ条件) を列挙
conditions:
  # 軸1: 主要4条件
  - id: plain_direct
  - id: plain_cot
  - id: so_answer_first
  - id: so_reasoning_first

  # 軸2: StepConstrained (n_steps ∈ {1, 3, 5, 10} × answer_first=False の 4 サブ条件)
  - id: "so_step_constrained:n_steps=1:answer_first=False"
  - id: "so_step_constrained:n_steps=3:answer_first=False"
  - id: "so_step_constrained:n_steps=5:answer_first=False"
  - id: "so_step_constrained:n_steps=10:answer_first=False"

  # b0 文献比較校正条件 (主仮説対象外・記述統計のみ)
  - id: lit_mgsm_direct_ja
  - id: lit_mgsm_native_cot_ja

# 軸3: Runner
runners: [openai_sdk, azure_sdk, langchain]

# 軸4: Temperature × N
temp_sets:
  det:
    temperature: 0.0
    n_tries: 1
  sc:
    temperature: 0.7
    n_tries: 5

# 軸5: Model (key / deployment / reasoning_effort)
# - key: JSONL の model_key カラムに入る論理名。
# - deployment: Azure テナント固有のデプロイ名 (各自書き換える)。
# - reasoning_effort: gpt-5 系 reasoning モデルのみ非 null。それ以外は null。
models:
  - key: gpt-4.1
    deployment: <fill-in-gpt-4.1-deployment>
    reasoning_effort: null
  - key: gpt-4.1-mini
    deployment: <fill-in-gpt-4.1-mini-deployment>
    reasoning_effort: null
  - key: gpt-5
    deployment: <fill-in-gpt-5-deployment>
    reasoning_effort: minimal

# データ (MGSM-ja 全 250 問)
dataset:
  name: mgsm
  config: ja
  split: test
  seed: 42
  n: 250

# Stage プリセット (CLI `--stage <name>` で選択)
stages:
  smoke:
    conditions: [plain_direct, plain_cot, so_answer_first, so_reasoning_first, lit_mgsm_direct_ja, lit_mgsm_native_cot_ja]
    runners: [openai_sdk, azure_sdk, langchain]
    temp_sets: [det]
    n_questions: 1
  b0:
    # 文献比較校正 (2 lit 条件 × det × 3 model = 4,500 calls)
    conditions: [lit_mgsm_direct_ja, lit_mgsm_native_cot_ja]
    runners: [openai_sdk, azure_sdk, langchain]
    temp_sets: [det]
  b1:
    # Plain + SO 基本 (4 cond) × det × 3 model
    conditions: [plain_direct, plain_cot, so_answer_first, so_reasoning_first]
    runners: [openai_sdk, azure_sdk, langchain]
    temp_sets: [det]
  b2:
    # StepConstrained 全 4 サブ条件 × det × 3 model
    conditions:
      - "so_step_constrained:n_steps=1:answer_first=False"
      - "so_step_constrained:n_steps=3:answer_first=False"
      - "so_step_constrained:n_steps=5:answer_first=False"
      - "so_step_constrained:n_steps=10:answer_first=False"
    runners: [openai_sdk, azure_sdk, langchain]
    temp_sets: [det]
  b3:
    # 全 8 条件 × sc (T=0.7×5) × 3 model
    conditions:
      - plain_direct
      - plain_cot
      - so_answer_first
      - so_reasoning_first
      - "so_step_constrained:n_steps=1:answer_first=False"
      - "so_step_constrained:n_steps=3:answer_first=False"
      - "so_step_constrained:n_steps=5:answer_first=False"
      - "so_step_constrained:n_steps=10:answer_first=False"
    runners: [openai_sdk, azure_sdk, langchain]
    temp_sets: [sc]
